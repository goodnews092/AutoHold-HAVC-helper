            id: btn_driver
            x: -175
            y: 180
            width: 100
            height: 60
            align: center
            styles: style_btn_rect
            on_click:
              - lambda: |-
                  register_user_interaction(); id(driver_state) = !id(driver_state);
                  update_text_glow(id(lbl_driver), id(driver_state), lv_color_hex(0x0095FF)); id(send_hvac_state).execute();
            widgets:
              - label: {id: lbl_driver, text: "DRIVER\nONLY", styles: style_label, align: center}

        - button:
            id: btn_ac
            x: -58
            y: 180
            width: 100
            height: 60
            align: center
            styles: style_btn_rect
            on_click:
              - lambda: |-
                  register_user_interaction(); id(ac_state) = !id(ac_state);
                  update_text_glow(id(lbl_ac), id(ac_state), lv_color_hex(0x0095FF)); id(send_hvac_state).execute();
            widgets:
              - label: {id: lbl_ac, text: "A / C", styles: style_label, align: center}

        - button:
            id: btn_heat
            x: 58
            y: 180
            width: 100
            height: 60
            align: center
            styles: style_btn_rect
            on_click:
              - lambda: |-
                  register_user_interaction(); id(heat_state) = !id(heat_state);
                  update_text_glow(id(lbl_heat), id(heat_state), lv_color_hex(0xFF8000)); id(send_hvac_state).execute();
            widgets:
              - label: {id: lbl_heat, text: "HEAT", styles: style_label, align: center}

        - button:
            id: btn_sync
            x: 175
            y: 180
            width: 100
            height: 60
            align: center
            styles: style_btn_rect
            on_click:
              - lambda: |-
                  register_user_interaction(); id(sync_state) = !id(sync_state);
                  update_text_glow(id(lbl_sync), id(sync_state), lv_color_hex(0x2DA041)); id(send_hvac_state).execute();
            widgets:
              - label: {id: lbl_sync, text: "SYNC", styles: style_label, align: center}

        - label:
            id: lbl_mac
            x: -10
            y: -10
            align: bottom_right
            text: "--:--:--:--:--:--"
            styles: style_mac_label